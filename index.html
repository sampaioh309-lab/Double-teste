<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Blaze</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

/* LOGIN */
#loginBox{
position:fixed;
inset:0;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

input,button{
padding:10px;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

/* APP */
#app{display:none;padding:10px;}

#linha{
display:flex;
gap:5px;
overflow:auto;
margin:10px;
}

.green{color:#00ff55;font-size:28px;font-weight:bold}
.red{color:#ff0033;font-size:28px;font-weight:bold}

/* BLOQUEIO */
#bloqueio{
display:none;
position:fixed;
inset:0;
background:#020617;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>LOGIN</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="logar()">Entrar</button>
<p id="msg"></p>
</div>

<!-- APP -->
<div id="app">

<h2>SISTEMA I.A</h2>

<div>
GREEN: <span id="greens">0</span> |
LOSS: <span id="losses">0</span> |
BRANCO: <span id="brancos">0</span>
</div>

<div id="linha"></div>

<div>
<button onclick="add('R')">🔴</button>
<button onclick="add('B')">⚫</button>
<button onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>

</div>

<!-- BLOQUEIO -->
<div id="bloqueio">
<h1 style="color:#00ff55">✅ TESTE FINALIZADO</h1>
<p>Entre em contato com o suporte</p>
<button onclick="location.reload()">Reiniciar</button>
</div>

<script>

/* 🔐 USUÁRIOS */
const usuarios={

"cliente01":"Ax#91LmQ","cliente02":"Bp#73RtZ","cliente03":"Cr#64WpX","cliente04":"Ds#85QaM","cliente05":"Et#52LmK",
"cliente06":"Fu#94RtP","cliente07":"Gv#61WpD","cliente08":"Hw#78QaS","cliente09":"Ix#43LmR","cliente10":"Jy#82RtV",

"cliente11":"Kz#55WpB","cliente12":"La#97QaN","cliente13":"Mb#68LmT","cliente14":"Nc#74RtQ","cliente15":"Od#59WpF",
"cliente16":"Pe#83QaL","cliente17":"Qf#62LmX","cliente18":"Rg#91RtM","cliente19":"Sh#47WpK","cliente20":"Ti#76QaD",

"cliente21":"Uj#54LmP","cliente22":"Vk#89RtS","cliente23":"Wl#63WpZ","cliente24":"Xm#72QaA","cliente25":"Yn#95LmE",
"cliente26":"Zo#58RtH","cliente27":"Ap#81WpJ","cliente28":"Bq#69QaU","cliente29":"Cr#44LmC","cliente30":"Ds#87RtY",

"cliente31":"Et#53WpN","cliente32":"Fu#90QaR","cliente33":"Gv#71LmW","cliente34":"Hw#65RtO","cliente35":"Ix#92WpI",
"cliente36":"Jy#60QaX","cliente37":"Kz#84LmS","cliente38":"La#57RtG","cliente39":"Mb#73WpV","cliente40":"Nc#88QaB",

"cliente41":"Od#66LmF","cliente42":"Pe#79RtD","cliente43":"Qf#51WpT","cliente44":"Rg#93QaH","cliente45":"Sh#62LmZ",
"cliente46":"Ti#85RtK","cliente47":"Uj#48WpM","cliente48":"Vk#97QaE","cliente49":"Wl#74LmA","cliente50":"Xm#69RtC"

};

/* LOGIN */
function logar(){
let l=document.getElementById("login").value.trim();
let s=document.getElementById("senha").value.trim();

if(usuarios[l] && usuarios[l]===s){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
}else{
document.getElementById("msg").innerText="❌ Login inválido";
}
}

/* SISTEMA */
let greens=0, losses=0, brancos=0;
let limite=5;

let seq=[], sinal=null, gale=0;

/* ELEMENTOS */
const greensEl=document.getElementById("greens");
const lossesEl=document.getElementById("losses");
const brancosEl=document.getElementById("brancos");
const linha=document.getElementById("linha");
const result=document.getElementById("result");

/* BLOQUEIO */
function bloquear(){
document.getElementById("app").style.display="none";
document.getElementById("bloqueio").style.display="flex";
}

/* ATUALIZAR */
function atualizar(){
greensEl.innerText=greens;
lossesEl.innerText=losses;
brancosEl.innerText=brancos;
}

/* ADD RESULTADO */
function add(c){

/* adiciona histórico */
seq.push(c);

let el=document.createElement("span");
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪";
linha.appendChild(el);

/* validação */
if(sinal){

if(c==="W"){
greens++; brancos++;
result.innerHTML="<div class='green'>⚪ GREEN</div>";
reset();
check();
return;
}

if(c===sinal){
greens++;
result.innerHTML="<div class='green'>🟢 GREEN</div>";
reset();
check();
return;
}

if(gale===0){
gale=1;
result.innerText="♻️ G1";
return;
}

losses++;
result.innerHTML="<div class='red'>❌ LOSS</div>";
reset();
return;
}

/* estratégia */
if(seq.length>=6){

let entrada = seq[seq.length-6];

if(entrada!=="W" && !seq.slice(-3).includes("W")){
sinal = entrada;
result.innerHTML="📡 Entrar "+(sinal==="R"?"🔴":"⚫")+" + ⚪";
}

}

}

/* CHECK BLOQUEIO */
function check(){
if(greens === limite){
setTimeout(bloquear, 800);
}
}

/* RESET */
function reset(){
sinal=null;
gale=0;
atualizar();
}

</script>

</body>
</html>
