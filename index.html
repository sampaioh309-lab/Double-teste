function fazerLogin(){
let l=document.getElementById("login").value.trim();

/* SISTEMA */
let greens=0, losses=0, brancos=0;
let limiteGreens=5;
let bloqueado=false;

let seq=[], sinal=null, gale=0;

function add(c){

if(bloqueado) return;

if(greens>=limiteGreens){
bloqueado=true;
document.getElementById("app").style.display="none";
document.getElementById("bloqueioTela").style.display="flex";
return;
}

seq.push(c);

const el=document.createElement("span");
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪";
document.getElementById("linha").appendChild(el);

if(sinal){

if(c==="W"){greens++; brancos++; reset(); return;}
if(c===sinal){greens++; reset(); return;}

if(gale===0){gale=1; return;}

losses++; reset(); return;
}

if(seq.length>=6){
let entrada=seq[seq.length-6];
if(entrada!=="W"){sinal=entrada;}
}

update();
}

function reset(){
sinal=null;
gale=0;
update();
}

function update(){
