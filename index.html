<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>
<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
body{background:#020617;font-family:Arial,sans-serif;color:#e5e7eb;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
#statsText{position:fixed;top:5px;left:6px;font-size:10px;color:#00ff88;z-index:999;}
#app{position:relative;z-index:1;max-width:420px;height:100vh;margin:auto;padding:6px;display:flex;flex-direction:column;gap:6px;text-align:center;}
.titulo{font-size:20px;font-weight:900;color:#ff0033}
.versao{font-size:13px;font-weight:900;color:#ff0033;margin-top:-4px}
.blue-neon{text-shadow:0 0 6px #3b82f6}
#hora{font-size:12px}
#placar{display:flex;justify-content:space-between;font-size:11px;}
.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}
#linha{display:flex;gap:4px;overflow-x:auto;font-size:16px;padding:4px;}
#linha::-webkit-scrollbar{display:none}
#botoes{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
button{padding:6px;font-size:11px;font-weight:bold;border:none;border-radius:8px;}
.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}
#result{min-height:40px;font-size:13px;font-weight:bold;text-align:center;}
#modalBranco{position:fixed;bottom:10px;right:10px;background:rgba(2,6,23,0.95);border:1px solid #facc15;box-shadow:0 0 8px #facc15;padding:6px 8px;border-radius:8px;width:120px;font-size:11px;text-align:center;z-index:99;display:none;}
#modalBranco h3{margin:0 0 4px 0;font-size:10px;color:#facc15;}
#modalBranco p{margin:2px 0;font-size:12px;font-weight:bold;color:#ffffff;}
.green-chamativo{font-size:32px;font-weight:900;color:#00ff55;text-shadow:0 0 15px #00ff55,0 0 30px #00ff55,0 0 50px #00ff55;}
.green-branco-chamativo{font-size:32px;font-weight:900;color:#00ffcc;text-shadow:0 0 15px #00ffcc,0 0 30px #00ffcc,0 0 50px #00ffcc;}
#loginBox{position:fixed; inset:0; background:#020617; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; gap:10px;}
#loginBox input{padding:10px;border-radius:6px;border:none;width:220px;}
#loginBox button{padding:10px;background:#22c55e;color:white;font-weight:bold;}
</style>
</head>
<body>

<div id="loginBox">
<h2>LOGIN TESTE</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="fazerLogin()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="statsText">
Sinais: <span id="totalSinais">0</span> | Assert: <span id="percentual">0%</span>
</div>

<canvas id="matrix"></canvas>

<div id="app">
<div>
<div class="titulo">SISTEMA I.A</div>
<div class="versao">V:9.60 MOBILE</div>
<div id="hora" class="blue-neon">🕒 --:--:--</div>
</div>

<div id="placar">
<span class="green-neon">GREEN <b id="greens">0</b></span>
<span class="red-neon">LOSS <b id="losses">0</b></span>
<span class="white-neon">BRANCO <b id="brancos">0</b></span>
</div>

<div id="linha"></div>

<div id="botoes">
<button class="red" onclick="add('R')">🔴</button>
<button class="black" onclick="add('B')">⚫</button>
<button class="white" onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>
</div>

<div id="modalBranco"></div>

<script>
/* ===== MATRIX ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth; canvas.height=innerHeight;}
resize(); window.onresize=resize;
const letters="01アイウエオ"; const fontSize=14; let drops=Array(Math.floor(innerWidth/fontSize)).fill(1);
function drawMatrix(){
ctx.fillStyle="rgba(2,6,23,0.35)"; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#ff0033"; ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
}}
setInterval(drawMatrix,50);

/* ===== USUÁRIOS ===== */
const usuarios={
"Henrique":"123456",
"cliente01":"Qa#84LmT","cliente02":"Zx#73WpR","cliente03":"Vr#92KdL","cliente04":"Mp#61QsA","cliente05":"Tf#58LzW",
"cliente06":"Hx#74PaK","cliente07":"Rb#69QtM","cliente08":"Ds#83LmV","cliente09":"Pw#52QkX","cliente10":"Lt#94WrS",
"cliente11":"Nz#47QaD","cliente12":"Kp#71LmZ","cliente13":"Bg#66RtH","cliente14":"Xq#53WpL","cliente15":"Sv#82QaT",
"cliente16":"Jr#59LmP","cliente17":"Fy#64RtQ","cliente18":"Ck#75WpA","cliente19":"Ub#91QaM","cliente20":"He#48LmR",
"cliente21":"Wt#83RtS","cliente22":"Dp#56WpZ","cliente23":"Ra#79QaL","cliente24":"Mk#62LmV","cliente25":"Gs#94RtX",
"cliente26":"Zp#41WpQ","cliente27":"Tv#68QaB","cliente28":"Xr#73LmT","cliente29":"Pf#55RtA","cliente30":"Nb#82WpM",
"cliente31":"Ly#64QaR","cliente32":"Cd#78LmS","cliente33":"Qv#93RtK","cliente34":"Hw#52WpL","cliente35":"Ek#69QaP",
"cliente36":"Fp#47LmD","cliente37":"Bg#88RtT","cliente38":"Uz#63WpQ","cliente39":"Ir#71QaZ","cliente40":"Km#54LmX",
"cliente41":"Xd#82RtR","cliente42":"Tv#66WpA","cliente43":"Jp#95QaS","cliente44":"Wq#43LmM","cliente45":"Sb#76RtL",
"cliente46":"Rp#59WpK","cliente47":"Zf#72QaV","cliente48":"Hg#84LmA","cliente49":"Dr#61RtZ","cliente50":"Vx#90WpP"
};

/* ===== LOGIN ===== */
function fazerLogin(){
let l=document.getElementById("login").value;
let s=document.getElementById("senha").value;
if(!usuarios[l] || usuarios[l]!==s){document.getElementById("loginMsg").innerText="Login ou senha inválidos"; return;}
let usados=JSON.parse(localStorage.getItem("testes_usados")||"[]");
if(l!=="Henrique"){ if(usados.includes(l)){document.getElementById("loginMsg").innerText="Este login já utilizou o teste."; return;} usados.push(l); localStorage.setItem("testes_usados",JSON.stringify(usados));}
greens=0; losses=0; brancos=0; totalSinais=0; seq=[]; sinal=null; gale=0; textoSinal=""; linha.innerHTML=""; result.innerHTML="⏸️ AGUARDAR"; atualizar(); atualizarStats();
possiveisBrancos=[]; modalBranco.style.display="none";
document.getElementById("loginBox").style.display="none"; document.getElementById("loginMsg").innerText="";
}

/* ===== SISTEMA ===== */
const linha=document.getElementById("linha"); const result=document.getElementById("result");
const greensEl=document.getElementById("greens"); const lossesEl=document.getElementById("losses"); const brancosEl=document.getElementById("brancos");
const modalBranco=document.getElementById("modalBranco");
let sinal=null, gale=0;
let greens=0, losses=0, brancos=0;
let totalSinais=0;
let textoSinal="";
let possiveisBrancos=[];
let limiteGreensTeste=10;
let seq=[];

/* ===== CLIQUE ===== */
function add(c){
if(greens >= limiteGreensTeste){result.innerHTML = "<div class='green-chamativo'>✅ TESTE FINALIZADO - 10 GREENS</div>"; return;}
seq.push(c);
const el = document.createElement("span"); el.innerText = c==="R"?"🔴":c==="B"?"⚫":"⚪"; linha.appendChild(el); linha.scrollLeft = linha.scrollWidth;

if(c === "W"){
    gerarPossiveisBrancos();
    result.innerHTML = "<div class='white-neon'>⚪ POSSÍVEIS BRANCOS GERADOS</div>";
    return;
}

sinal ? validar(c) : analisar();

if(c==="W"){verificarGreenBranco();}
}

/* ===== ESTRATÉGIAS ===== */
function analisar(){
    // Padrões normais
    const padroes=[
        {p:"RBBBB",s:"B"},
        {p:"BRRRR",s:"B"},
        {p:"BRBRR",s:"R"},
        {p:"BBBRR",s:"B"},
        {p:"BBBBR",s:"R"},
        {p:"RRBBB",s:"B"},
        {p:"BBRRB",s:"B"}
    ];
    // Padrões com branco
    const padroesBranco=[
        {p:"WR",s:"R"},
        {p:"WB",s:"B"}
    ];

    for(let p of padroes){
        if(seq.slice(-p.p.length).join("")===p.p){
            sinal=p.s; totalSinais++;
            textoSinal=`📡 SINAL I.A<br>Apostar no ${sinal==="R"?"🔴":"⚫"}<br>♻️ Até G1<br>⚪ Proteção Branco`;
            result.innerHTML=textoSinal;
            atualizarStats();
            return;
        }
    }

    for(let p of padroesBranco){
        if(seq.slice(-2).join("")===p.p){
            sinal=p.s; totalSinais++;
            textoSinal=`📡 SINAL I.A<br>Apostar no ${sinal==="R"?"🔴":"⚫"}<br>♻️ Até G1<br>⚪ Proteção Branco`;
            result.innerHTML=textoSinal;
            atualizarStats();
            return;
        }
    }
}

/* ===== POSSIVEIS BRANCOS ===== */
function gerarPossiveisBrancos(){
let agora=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
possiveisBrancos=[];
let html="<h3>⚪ POSSÍVEIS</h3>";
let minutos=[5,8,11,14];
for(let i=0;i<minutos.length;i++){
    let b = new Date(agora.getTime());
    b.setMinutes(b.getMinutes() + minutos[i]);
    let h = b.getHours(); let m = b.getMinutes();
    possiveisBrancos.push({hora:h,minuto:m});
    html+=`<p>${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}</p>`;
}
modalBranco.innerHTML=html; modalBranco.style.display="block";
}

/* ===== VERIFICAR GREEN BRANCO ===== */
function verificarGreenBranco(){
const agora=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
const minutoAtual = agora.getHours()*60 + agora.getMinutes();
for(let b of possiveisBrancos){
    const centro = b.hora*60 + b.minuto;
    if(Math.abs(minutoAtual - centro) <= 1){
        greens++; brancos++; atualizar(); atualizarStats();
        result.innerHTML="<div class='green-branco-chamativo'>⚪🟢 GREEN BRANCO</div>";
        possiveisBrancos=[];
        return true;
    }
}
return false;
}

/* ===== AUX ===== */
function validar(c){if(c===sinal){greens++; atualizar(); atualizarStats(); result.innerHTML="<div class='green-chamativo'>🟢 GREEN</div>"; resetar();}else{if(gale===0){gale=1; result.innerHTML=textoSinal+"<br>♻️ ENTRAR G1";}else{losses++; atualizar(); atualizarStats(); result.innerHTML="❌ LOSS"; resetar();}}}
function resetar(){setTimeout(()=>{sinal=null; gale=0; textoSinal=""; result.innerHTML="⏸️ AGUARDAR";},1200);}
function atualizar(){greensEl.innerText=greens; lossesEl.innerText=losses; brancosEl.innerText=brancos;}
function atualizarStats(){document.getElementById("totalSinais").innerText=totalSinais; let p=totalSinais>0?((greens/totalSinais)*100).toFixed(1):0; document.getElementById("percentual").innerText=p+"%";}
function atualizarHora(){const b=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"})); document.getElementById("hora").innerText="🕒 "+b.toLocaleTimeString("pt-BR")+" (Brasília)";}
setInterval(atualizarHora,1000); atualizarHora();
</script>

</body>
          </html>
