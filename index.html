<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>

<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}

body{
background:#020617;
font-family:Arial,sans-serif;
color:#e5e7eb;
overflow:hidden
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0
}

#app{
position:relative;
z-index:2;
max-width:420px;
height:100vh;
margin:auto;
padding:6px;
display:flex;
flex-direction:column;
gap:6px;
text-align:center
}

.titulo{
font-size:20px;
font-weight:900;
color:#ff0033
}

.versao{
font-size:13px;
font-weight:900;
color:#ff0033;
margin-top:-4px
}

#hora{
font-size:12px
}

#placar{
display:flex;
justify-content:space-between;
font-size:11px
}

.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}

#linha{
display:flex;
gap:4px;
overflow-x:auto;
font-size:16px;
padding:4px
}

#botoes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px
}

button{
padding:6px;
font-size:11px;
font-weight:bold;
border:none;
border-radius:8px
}

.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}

#result{
min-height:40px;
font-size:13px;
font-weight:bold
}

.green-chamativo{
font-size:32px;
font-weight:900;
color:#00ff55;
text-shadow:0 0 15px #00ff55,0 0 30px #00ff55,0 0 50px #00ff55
}

#loginBox{
position:fixed;
inset:0;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
gap:10px
}

#loginBox input{
padding:10px;
border-radius:6px;
border:none;
width:220px
}

#loginBox button{
padding:10px;
background:#22c55e;
color:white;
font-weight:bold
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="loginBox">
<h2>LOGIN</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="fazerLogin()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="app">

<div>
<div class="titulo">SISTEMA I.A</div>
<div class="versao">V:9.60 MOBILE</div>
<div id="hora">🕒 --:--:--</div>
</div>

<div id="placar">
<span class="green-neon">GREEN <b id="greens">0</b></span>
<span class="red-neon">LOSS <b id="losses">0</b></span>
<span class="white-neon">BRANCO <b id="brancos">0</b></span>
</div>

<div id="linha"></div>

<div id="botoes">
<button class="red" onclick="add('R')">🔴</button>
<button class="black" onclick="add('B')">⚫</button>
<button class="white" onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>

</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01アイウエオ"
const fontSize=14
const columns=canvas.width/fontSize

const drops=[]
for(let x=0;x<columns;x++){drops[x]=1}

function draw(){
ctx.fillStyle="rgba(2,6,23,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff0033"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}
drops[i]++
}
}
setInterval(draw,33)

/* LOGIN */
const usuarios={"Henrique":"123456"}

function fazerLogin(){
let l=document.getElementById("login").value
let s=document.getElementById("senha").value

if(!usuarios[l] || usuarios[l]!==s){
document.getElementById("loginMsg").innerText="Login ou senha inválidos"
return
}
document.getElementById("loginBox").style.display="none"
}

/* SISTEMA */

const linha=document.getElementById("linha")
const result=document.getElementById("result")

const greensEl=document.getElementById("greens")
const lossesEl=document.getElementById("losses")
const brancosEl=document.getElementById("brancos")

let greens=0, losses=0, brancos=0
let seq=[], sinal=null, gale=0

let janelaBranco=null

function gerarJanelaBranco(){
let agora=new Date()
let base=new Date(agora.getTime()+5*60000)

let horarios=[]
for(let i=0;i<4;i++){
let t=new Date(base.getTime()+i*3*60000)
horarios.push(t)
}

let inicio=new Date(horarios[0].getTime()-60000)
let fim=new Date(horarios[3].getTime()+60000)

janelaBranco={
inicio:inicio.getTime(),
fim:fim.getTime()
}
}

function add(c){

seq.push(c)

const el=document.createElement("span")
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪"
linha.appendChild(el)
linha.scrollLeft=linha.scrollWidth

let agora=Date.now()

/* ⚪ BRANCO POR HORÁRIO */
if(c==="W" && janelaBranco && agora>=janelaBranco.inicio && agora<=janelaBranco.fim){
greens++; brancos++
greensEl.innerText=greens
brancosEl.innerText=brancos

result.innerHTML="<div class='green-chamativo'>⚪ GREEN HORÁRIO</div>"

janelaBranco=null
return
}

/* VALIDAÇÃO */
if(sinal){

if(c==="W"){
greens++; brancos++
greensEl.innerText=greens
brancosEl.innerText=brancos

result.innerHTML="<div class='green-chamativo'>⚪🟢 GREEN</div>"

sinal=null; gale=0
return
}

if(c===sinal){
greens++
greensEl.innerText=greens

result.innerHTML="<div class='green-chamativo'>🟢 GREEN</div>"

sinal=null; gale=0
return
}

if(gale===0){
gale=1
result.innerHTML="♻️ G1"
return
}

losses++
lossesEl.innerText=losses

result.innerHTML="❌ LOSS"

sinal=null; gale=0
return
}

/* ESTRATÉGIA */

if(seq.length<6){
result.innerHTML="⏸️ AGUARDAR"
return
}

let entrada = seq[seq.length-6]

if(seq.slice(-3).includes("W")){
result.innerHTML="⚠️ Branco recente"
return
}

if(entrada==="W"){
result.innerHTML="⚠️ Entrada inválida"
return
}

sinal=entrada

result.innerHTML="📡 SINAL<br>Apostar "+(sinal==="R"?"🔴":"⚫")+"<br>♻️ Até G1<br>⚪ Proteção Branco"

if(c==="W" && !sinal){
gerarJanelaBranco()
}

}

/* HORA */
function atualizarHora(){
const agora=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}))
document.getElementById("hora").innerText="🕒 "+agora.toLocaleTimeString("pt-BR")
}
setInterval(atualizarHora,1000)

</script>

</body>
  </html>
