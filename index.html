<style>

html,body{width:100%;height:100%;margin:0}
body{background:#020617;font-family:Arial,sans-serif;color:#e5e7eb;overflow:hidden}

canvas{position:fixed;inset:0;z-index:0}

#statsText{
position:fixed;

#app{

padding:6px;

.titulo{

.versao{

.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}

#linha{

font-size:16px;
padding:4px;
}

#linha::-webkit-scrollbar{display:none}

#botoes{
display:grid;
grid-template-columns:repeat(3,1fr);

}

button{
padding:6px;
font-size:11px;
font-weight:bold;
border:none;
border-radius:8px;
}

.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}

#result{

font-size:13px;
font-weight:bold;

#modalBranco{

background:rgba(2,6,23,0.95);

border-radius:8px;

font-size:11px;
text-align:center;
z-index:99;
display:none;
}

margin:0 0 4px 0;
font-size:10px;
color:#facc15;
}

#modalBranco p{
margin:2px 0;
font-size:12px;
font-weight:bold;
color:#ffffff;
}

.green-chamativo{
font-size:32px;

color:#00ff55;

.green-branco-chamativo{
font-size:32px;
font-weight:900;
color:#00ffcc;
text-shadow:0 0 15px #00ffcc,0 0 30px #00ffcc,0 0 50px #00ffcc;
}

/* LOGIN */

inset:0;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
z-index:9999;
}

#loginBox input{
padding:10px;
border-radius:6px;
border:none;
width:220px;
}

#loginBox button{
padding:10px;
background:#22c55e;
color:white;
font-weight:bold;
}
