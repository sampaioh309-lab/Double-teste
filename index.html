<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>

<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}

body{
background:#020617;
font-family:Arial;
color:#e5e7eb;
overflow:hidden
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0
}

#app{
position:relative;
z-index:2;
max-width:420px;
height:100vh;
margin:auto;
padding:6px;
display:flex;
flex-direction:column;
gap:6px;
text-align:center
}

.titulo{font-size:20px;font-weight:900;color:#00aaff}
.versao{font-size:13px;font-weight:900;color:#00aaff}

#placar{
display:flex;
justify-content:space-between;
font-size:11px
}

.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}

#linha{
display:flex;
gap:4px;
overflow-x:auto;
font-size:16px;
padding:4px
}

#botoes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px
}

button{
padding:6px;
font-size:11px;
font-weight:bold;
border:none;
border-radius:8px
}

.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}

#result{
min-height:40px;
font-size:13px;
font-weight:bold
}

.green-chamativo{
font-size:28px;
font-weight:900;
color:#00ff55;
text-shadow:0 0 20px #00ff55
}

#loginBox{
position:fixed;
inset:0;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
gap:10px
}

#loginBox input{
padding:10px;
border-radius:6px;
border:none;
width:220px
}

#loginBox button{
padding:10px;
background:#22c55e;
color:white;
font-weight:bold
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="loginBox">
<h2>LOGIN</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="fazerLogin()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="app">

<div>
<div class="titulo">SISTEMA I.A</div>
<div class="versao">V:10 PRO</div>
<div id="hora"></div>
</div>

<div id="placar">
<span class="green-neon">GREEN <b id="greens">0</b></span>
<span class="red-neon">LOSS <b id="losses">0</b></span>
<span class="white-neon">BRANCO <b id="brancos">0</b></span>
</div>

<div id="linha"></div>

<div id="botoes">
<button class="red" onclick="add('R')">🔴</button>
<button class="black" onclick="add('B')">⚫</button>
<button class="white" onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>

</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01アイウエオ"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let x=0;x<columns;x++){drops[x]=1}

function draw(){
ctx.fillStyle="rgba(2,6,23,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00aaff"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}
drops[i]++
}
}
setInterval(draw,33)

/* LOGIN */
const usuarios = {
"cliente01":"Kx#92LmQ","cliente02":"Tr#47PdZ","cliente03":"Wp#83AxL","cliente04":"Bn#51QwM","cliente05":"Hy#74ZrK",
"cliente06":"Ju#69LpT","cliente07":"Fo#28XcD","cliente08":"Re#95VaS","cliente09":"Ci#73NmR","cliente10":"Da#62YtV",
"cliente11":"Mz#84KpB","cliente12":"Qa#57WxN","cliente13":"Lo#91EtT","cliente14":"Nx#36RuQ","cliente15":"Gi#78WpF",
"cliente16":"Pe#45ZdL","cliente17":"Xo#88LmX","cliente18":"Ur#52QaM","cliente19":"Sw#97TpK","cliente20":"Af#61BdD",
"cliente21":"Yh#34LsP","cliente22":"Vb#76RtS","cliente23":"Kd#29WpZ","cliente24":"Cm#85QaA","cliente25":"Tg#68LmE",
"cliente26":"Zo#93HtH","cliente27":"Ap#55WqJ","cliente28":"Bx#72UaU","cliente29":"Cr#41LmC","cliente30":"Ds#89RtY",
"cliente31":"Et#63WpN","cliente32":"Fu#96QaR","cliente33":"Gv#58LmW","cliente34":"Hw#27RtO","cliente35":"Ix#81WpI",
"cliente36":"Jy#49QaX","cliente37":"Kz#94LmS","cliente38":"La#67RtG","cliente39":"Mb#32WpV","cliente40":"Nc#86QaB",
"cliente41":"Od#59LmF","cliente42":"Pe#74RtD","cliente43":"Qf#21WpT","cliente44":"Rg#98QaH","cliente45":"Sh#65LmZ",
"cliente46":"Ti#83RtK","cliente47":"Uj#46WpM","cliente48":"Vk#91QaE","cliente49":"Wl#38LmA","cliente50":"Xm#77RtC"
}

function fazerLogin(){

let user = login.value
let pass = senha.value

if(!usuarios[user] || usuarios[user] !== pass){
loginMsg.innerText = "Login inválido"
return
}

let usado = localStorage.getItem("login_usado")

if(usado){
loginMsg.innerText = "⚠️ Este dispositivo já utilizou um login"
return
}

localStorage.setItem("login_usado", user)

loginBox.style.display = "none"

}

/* SISTEMA */

const greensEl = document.getElementById("greens")
const lossesEl = document.getElementById("losses")
const brancosEl = document.getElementById("brancos")
const linha = document.getElementById("linha")
const result = document.getElementById("result")

let greens=0
let losses=0
let brancos=0
let limiteGreens=5

let seq=[]
let sinal=null
let gale=0

function add(c){

if(greens>=limiteGreens){
result.innerHTML="<div class='green-chamativo'>✅ TESTE FINALIZADO - 5 GREENS</div>"
return
}

seq.push(c)

let el=document.createElement("span")
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪"
linha.appendChild(el)
linha.scrollLeft=linha.scrollWidth

if(sinal){

if(c==="W"){
greens++; brancos++
greensEl.innerText=greens
brancosEl.innerText=brancos
result.innerHTML="<div class='green-chamativo'>⚪🟢 GREEN BRANCO</div>"
resetar()
return
}

if(c === sinal){
greens++
greensEl.innerText=greens
result.innerHTML="<div class='green-chamativo'>🟢 GREEN</div>"
resetar()
return
}else{

if(gale===0){
gale=1
result.innerHTML="♻️ ENTRAR G1"
return
}else{
losses++
lossesEl.innerText=losses
result.innerHTML="❌ LOSS"
resetar()
return
}

}
}

if(seq.length<6) return

let entrada = seq[seq.length-6]

if(seq.slice(-3).includes("W")) return
if(entrada==="W") return

sinal=entrada

result.innerHTML="📡 SINAL<br>Apostar "+(sinal==="R"?"🔴":"⚫")+"<br>♻️ Até G1<br>⚪ Proteção Branco"

}

function resetar(){
sinal=null
gale=0
}

/* HORA */
function atualizarHora(){
let agora=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}))
hora.innerText="🕒 "+agora.toLocaleTimeString("pt-BR")
}
setInterval(atualizarHora,1000)

</script>

</body>
</html>
