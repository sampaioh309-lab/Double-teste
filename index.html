<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>

<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
body{background:#020617;font-family:Arial,sans-serif;color:#e5e7eb;overflow:hidden}

#loginBox{
position:fixed;inset:0;background:#020617;
display:flex;flex-direction:column;justify-content:center;
align-items:center;gap:10px;z-index:9999;
}

#loginBox input{
padding:10px;border-radius:6px;border:none;width:220px;
}

#loginBox button{
padding:10px;background:#22c55e;color:white;font-weight:bold;
}

#app{display:none;padding:10px;text-align:center}

#linha{display:flex;gap:5px;overflow-x:auto;font-size:18px;margin:10px 0}
button{padding:8px;font-size:14px}
</style>
</head>

<body>

<div id="loginBox">
<h2>LOGIN TESTE</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="fazerLogin()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="app">

<h2>SISTEMA I.A</h2>

<div>
GREEN <b id="greens">0</b> |
LOSS <b id="losses">0</b>
</div>

<div id="linha"></div>

<div>
<button onclick="add('R')">🔴</button>
<button onclick="add('B')">⚫</button>
<button onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>

</div>

<script>

/* ===== 50 NOVOS LOGINS ===== */

const usuarios={

"cliente01":"Kp#73LmQ","cliente02":"Vr#52QaT","cliente03":"Hs#84RtL","cliente04":"Wx#61LpP","cliente05":"Df#79QaR",
"cliente06":"Gb#48LmZ","cliente07":"Qt#92LpK","cliente08":"Rm#57RtM","cliente09":"Sz#63QaV","cliente10":"Ty#74LpX",
"cliente11":"Ua#51LmL","cliente12":"Vp#89RtP","cliente13":"Wq#67QaR","cliente14":"Xr#42LpT","cliente15":"Ys#95LmM",
"cliente16":"Zt#58RtK","cliente17":"Ab#73QaX","cliente18":"Bc#64LpV","cliente19":"Cd#91LmL","cliente20":"De#47RtP",
"cliente21":"Ef#82QaR","cliente22":"Fg#59LpX","cliente23":"Gh#76LmT","cliente24":"Hi#63RtM","cliente25":"Ij#88QaK",
"cliente26":"Jk#54LpQ","cliente27":"Kl#97LmV","cliente28":"Lm#62RtZ","cliente29":"Mn#71QaP","cliente30":"No#46LpR",
"cliente31":"Op#83LmX","cliente32":"Pq#69RtM","cliente33":"Qr#58QaV","cliente34":"Rs#92LpT","cliente35":"St#73LmP",
"cliente36":"Tu#61RtK","cliente37":"Uv#87QaR","cliente38":"Vw#52LpX","cliente39":"Wx#79LmM","cliente40":"Xy#64RtL",
"cliente41":"Yz#91QaZ","cliente42":"Za#48LpT","cliente43":"Ab#76LmK","cliente44":"Bc#57RtM","cliente45":"Cd#83QaX",
"cliente46":"De#69LpV","cliente47":"Ef#95LmP","cliente48":"Fg#54RtR","cliente49":"Gh#72QaQ","cliente50":"Hi#66LpM"

};

/* ===== LOGIN ===== */

function fazerLogin(){

let login=document.getElementById("login").value.trim();
let senha=document.getElementById("senha").value.trim();

if(usuarios[login] && usuarios[login]===senha){

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

}else{

document.getElementById("loginMsg").innerText="Login ou senha inválidos";

}

}

/* ENTER FUNCIONANDO */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

fazerLogin();

}

});

/* ===== SISTEMA ===== */

const linha=document.getElementById("linha");
const result=document.getElementById("result");

let greens=0;
let losses=0;
let sinal=null;
let gale=0;

let seq=[];

let limiteGreensTeste=5;

/* ===== CLIQUE ===== */

function add(c){

if(greens>=limiteGreensTeste){

result.innerHTML="✅ TESTE FINALIZADO - 5 GREENS";
return;

}

seq.push(c);

let el=document.createElement("span");

el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪";

linha.appendChild(el);

linha.scrollLeft=linha.scrollWidth;

sinal?validar(c):analisar();

}

/* ===== PADRÕES 5 CORES ===== */

function analisar(){

let ult5=seq.slice(-5).join("");

const padroes=[

{p:"RBBRB",s:"R"},
{p:"RBBBB",s:"B"},
{p:"BRRRR",s:"B"},
{p:"BRBRR",s:"R"},
{p:"BBBRR",s:"B"},
{p:"BBBBR",s:"R"},
{p:"RRBBB",s:"B"},
{p:"BBRRB",s:"B"}

];

for(let p of padroes){

if(ult5===p.p){

sinal=p.s;

result.innerHTML="📡 SINAL<br>Apostar "+(sinal==="R"?"🔴":"⚫");

return;

}

}

}

function validar(c){

if(c===sinal){

greens++;

document.getElementById("greens").innerText=greens;

result.innerHTML="🟢 GREEN";

resetar();

}else{

if(gale===0){

gale=1;

result.innerHTML="♻️ GALE 1";

}else{

losses++;

document.getElementById("losses").innerText=losses;

result.innerHTML="❌ LOSS";

resetar();

}

}

}

function resetar(){

setTimeout(()=>{

sinal=null;
gale=0;
result.innerHTML="⏸️ AGUARDAR";

},1200);

}

</script>

</body>
</html>
