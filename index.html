<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>

<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
body{background:#020617;font-family:Arial,sans-serif;color:#e5e7eb;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
#statsText{position:fixed;top:5px;left:6px;font-size:10px;color:#00ff88;z-index:999;}
#app{position:relative;z-index:1;max-width:420px;height:100vh;margin:auto;padding:6px;display:flex;flex-direction:column;gap:6px;text-align:center;}
.titulo{font-size:20px;font-weight:900;color:#ff0033}
.versao{font-size:13px;font-weight:900;color:#ff0033;margin-top:-4px}
.blue-neon{text-shadow:0 0 6px #3b82f6}
#hora{font-size:12px}
#placar{display:flex;justify-content:space-between;font-size:11px;}
.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}
#linha{display:flex;gap:4px;overflow-x:auto;font-size:16px;padding:4px;}
#linha::-webkit-scrollbar{display:none}
#botoes{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
button{padding:6px;font-size:11px;font-weight:bold;border:none;border-radius:8px;}
.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}
#result{min-height:40px;font-size:13px;font-weight:bold;text-align:center;}

#loginBox{
position:fixed; inset:0; background:#020617;
display:flex; flex-direction:column; justify-content:center;
align-items:center; z-index:9999; gap:10px;
}
#loginBox input{padding:10px;border-radius:6px;border:none;width:220px;}
#loginBox button{padding:10px;background:#22c55e;color:white;font-weight:bold;}
</style>
</head>

<body>

<div id="loginBox">
<h2>LOGIN TESTE</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="fazerLogin()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="statsText">Sinais: <span id="totalSinais">0</span> | Assert: <span id="percentual">0%</span></div>

<canvas id="matrix"></canvas>

<div id="app">
<div>
<div class="titulo">SISTEMA I.A</div>
<div class="versao">V:9.60 MOBILE</div>
<div id="hora">🕒 --:--:--</div>
</div>

<div id="placar">
<span class="green-neon">GREEN <b id="greens">0</b></span>
<span class="red-neon">LOSS <b id="losses">0</b></span>
<span class="white-neon">BRANCO <b id="brancos">0</b></span>
</div>

<div id="linha"></div>

<div id="botoes">
<button class="red" onclick="add('R')">🔴</button>
<button class="black" onclick="add('B')">⚫</button>
<button class="white" onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>
</div>

<script>

/* ===== NOVOS 50 LOGINS ===== */

const usuarios = {

"cliente01":"Kp#73LmQ","cliente02":"Vr#52QaT","cliente03":"Hs#84RtL","cliente04":"Wx#61LpP","cliente05":"Df#79QaR",
"cliente06":"Gb#48LmZ","cliente07":"Qt#92LpK","cliente08":"Rm#57RtM","cliente09":"Sz#63QaV","cliente10":"Ty#74LpX",
"cliente11":"Ua#51LmL","cliente12":"Vp#89RtP","cliente13":"Wq#67QaR","cliente14":"Xr#42LpT","cliente15":"Ys#95LmM",
"cliente16":"Zt#58RtK","cliente17":"Ab#73QaX","cliente18":"Bc#64LpV","cliente19":"Cd#91LmL","cliente20":"De#47RtP",
"cliente21":"Ef#82QaR","cliente22":"Fg#59LpX","cliente23":"Gh#76LmT","cliente24":"Hi#63RtM","cliente25":"Ij#88QaK",
"cliente26":"Jk#54LpQ","cliente27":"Kl#97LmV","cliente28":"Lm#62RtZ","cliente29":"Mn#71QaP","cliente30":"No#46LpR",
"cliente31":"Op#83LmX","cliente32":"Pq#69RtM","cliente33":"Qr#58QaV","cliente34":"Rs#92LpT","cliente35":"St#73LmP",
"cliente36":"Tu#61RtK","cliente37":"Uv#87QaR","cliente38":"Vw#52LpX","cliente39":"Wx#79LmM","cliente40":"Xy#64RtL",
"cliente41":"Yz#91QaZ","cliente42":"Za#48LpT","cliente43":"Ab#76LmK","cliente44":"Bc#57RtM","cliente45":"Cd#83QaX",
"cliente46":"De#69LpV","cliente47":"Ef#95LmP","cliente48":"Fg#54RtR","cliente49":"Gh#72QaQ","cliente50":"Hi#66LpM"

};

/* ===== LOGIN ===== */

function fazerLogin(){

let l=document.getElementById("login").value;
let s=document.getElementById("senha").value;

if(usuarios[l] && usuarios[l]===s){

document.getElementById("loginBox").style.display="none";

}else{

document.getElementById("loginMsg").innerText="Login ou senha inválidos";

}

}

/* ENTER LOGIN */

document.getElementById("login").addEventListener("keydown",function(e){
if(e.key==="Enter") fazerLogin();
});

document.getElementById("senha").addEventListener("keydown",function(e){
if(e.key==="Enter") fazerLogin();
});

/* ===== SISTEMA ===== */

const linha=document.getElementById("linha");
const result=document.getElementById("result");

let greens=0,losses=0,brancos=0;
let sinal=null,gale=0;
let seq=[];

let limiteGreensTeste=5;

/* ===== CLIQUE ===== */

function add(c){

if(greens>=limiteGreensTeste){

result.innerHTML="✅ TESTE FINALIZADO - 5 GREENS";
return;

}

seq.push(c);

const el=document.createElement("span");
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪";

linha.appendChild(el);

linha.scrollLeft=linha.scrollWidth;

sinal ? validar(c) : analisar();

}

/* ===== PADRÕES 5 CORES ===== */

function analisar(){

let ult5 = seq.slice(-5).join("");

const padroes=[

{p:"RBBRB",s:"R"},
{p:"RBBBB",s:"B"},
{p:"BRRRR",s:"B"},
{p:"BRBRR",s:"R"},
{p:"BBBRR",s:"B"},
{p:"BBBBR",s:"R"},
{p:"RRBBB",s:"B"},
{p:"BBRRB",s:"B"}

];

for(let p of padroes){

if(ult5===p.p){

sinal=p.s;

result.innerHTML="📡 SINAL I.A<br>Apostar "+(sinal==="R"?"🔴":"⚫")+"<br>G1";

return;

}

}

}

function validar(c){

if(c===sinal){

greens++;

result.innerHTML="🟢 GREEN";

resetar();

}else{

if(gale===0){

gale=1;

result.innerHTML="♻️ GALE 1";

}else{

losses++;

result.innerHTML="❌ LOSS";

resetar();

}

}

}

function resetar(){

setTimeout(()=>{

sinal=null;

gale=0;

result.innerHTML="⏸️ AGUARDAR";

},1200);

}

</script>

</body>
</html>
