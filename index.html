<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>

<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
body{background:#020617;font-family:Arial,sans-serif;color:#e5e7eb;overflow:hidden}

canvas{position:fixed;inset:0;z-index:0}

#statsText{position:fixed;top:5px;left:6px;font-size:10px;color:#00ff88;z-index:999;}

#app{
position:relative;
z-index:1;
max-width:420px;
height:100vh;
margin:auto;
padding:6px;
display:flex;
flex-direction:column;
gap:6px;
text-align:center;
}

.titulo{font-size:20px;font-weight:900;color:#ff0033}
.versao{font-size:13px;font-weight:900;color:#ff0033;margin-top:-4px}
.blue-neon{text-shadow:0 0 6px #3b82f6}

#hora{font-size:12px}

#placar{display:flex;justify-content:space-between;font-size:11px;}

.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}

#linha{
display:flex;
gap:4px;
overflow-x:auto;
font-size:16px;
padding:4px;
}

#linha::-webkit-scrollbar{display:none}

#botoes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
}

button{
padding:6px;
font-size:11px;
font-weight:bold;
border:none;
border-radius:8px;
}

.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}

#result{
min-height:40px;
font-size:13px;
font-weight:bold;
text-align:center;
}

.green-chamativo{
font-size:32px;
font-weight:900;
color:#00ff55;
text-shadow:0 0 15px #00ff55,0 0 30px #00ff55,0 0 50px #00ff55;
}

#loginBox{
position:fixed;
inset:0;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
gap:10px;
}

#loginBox input{
padding:10px;
border-radius:6px;
border:none;
width:220px;
}

#loginBox button{
padding:10px;
background:#22c55e;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div id="loginBox">
<h2>LOGIN TESTE</h2>
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha" type="password">
<button onclick="fazerLogin()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="statsText">
Sinais: <span id="totalSinais">0</span>
</div>

<canvas id="matrix"></canvas>

<div id="app">

<div>
<div class="titulo">SISTEMA I.A</div>
<div class="versao">V:9.60 MOBILE</div>
<div id="hora" class="blue-neon">🕒 --:--:--</div>
</div>

<div id="placar">
<span class="green-neon">GREEN <b id="greens">0</b></span>
<span class="red-neon">LOSS <b id="losses">0</b></span>
<span class="white-neon">BRANCO <b id="brancos">0</b></span>
</div>

<div id="linha"></div>

<div id="botoes">
<button class="red" onclick="add('R')">🔴</button>
<button class="black" onclick="add('B')">⚫</button>
<button class="white" onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();
window.onresize=resize;

const letters="01アイウエオ";
const fontSize=14;
let drops=Array(Math.floor(innerWidth/fontSize)).fill(1);

function drawMatrix(){

ctx.fillStyle="rgba(2,6,23,0.35)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff0033";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(drawMatrix,50);


/* LOGIN */

const usuarios={
"Henrique":"123456"
};

function fazerLogin(){

let l=document.getElementById("login").value;
let s=document.getElementById("senha").value;

if(!usuarios[l] || usuarios[l]!==s){

document.getElementById("loginMsg").innerText="Login ou senha inválidos";
return;

}

document.getElementById("loginBox").style.display="none";

}


/* SISTEMA */

const linha=document.getElementById("linha");
const result=document.getElementById("result");

const greensEl=document.getElementById("greens");
const lossesEl=document.getElementById("losses");
const brancosEl=document.getElementById("brancos");

let greens=0;
let losses=0;
let brancos=0;

let limiteGreensTeste=5;

let seq=[];
let sinal=null;
let gale=0;


/* PADRÕES */

const padroes=[

{p:"RBBBB",s:"B"},
{p:"BRRRR",s:"B"},
{p:"BRBRR",s:"R"},
{p:"BBBRR",s:"B"},
{p:"BBBBR",s:"R"},
{p:"RRBBB",s:"B"},
{p:"BBRRB",s:"B"},
{p:"WR",s:"R"},
{p:"WB",s:"B"}

];


/* CLIQUE */

function add(c){

if(greens>=limiteGreensTeste){
result.innerHTML="<div class='green-chamativo'>✅ TESTE FINALIZADO - 5 GREENS</div>";
return;
}

seq.push(c);

const el=document.createElement("span");
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪";

linha.appendChild(el);
linha.scrollLeft=linha.scrollWidth;


/* VALIDAR SINAL */

if(sinal){

if(c===sinal){

greens++;
greensEl.innerText=greens;

result.innerHTML="<div class='green-chamativo'>🟢 GREEN</div>";

sinal=null;
gale=0;

return;

}else{

if(gale===0){

gale=1;
result.innerHTML="♻️ ENTRAR G1";

}else{

losses++;
lossesEl.innerText=losses;

result.innerHTML="❌ LOSS";

sinal=null;
gale=0;

return;

}

}

}


/* ANALISAR PADRÕES */

let ultimos=seq.join("");

for(let p of padroes){

if(ultimos.endsWith(p.p)){

sinal=p.s;

result.innerHTML="📡 SINAL<br>Apostar no "+(sinal==="R"?"🔴":"⚫")+"<br>♻️ Até G1<br>⚪ Proteção Branco";

return;

}

}

}


/* RELÓGIO */

function atualizarHora(){

const b=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));

document.getElementById("hora").innerText="🕒 "+b.toLocaleTimeString("pt-BR")+" (Brasília)";

}

setInterval(atualizarHora,1000);
atualizarHora();

</script>

</body>
</html>
